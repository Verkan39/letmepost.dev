name: Docs improvement
description: Something on docs.letmepost.dev, letmepost.dev, or in this repo is wrong, missing, or unclear.
title: "docs: <short description>"
labels: ["type:docs", "area:docs", "status:needs-triage"]
body:
  - type: input
    id: url
    attributes:
      label: Page URL
      description: The exact page (or repo file path) that needs work.
      placeholder: https://docs.letmepost.dev/preflight/...
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What's wrong or missing?
      description: |
        Be concrete — quote the exact sentence/code-block that confused you,
        or describe the gap ("nowhere does it say X").
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested change
      description: Optional, but helpful. A rough sentence-level rewrite, an example to add, a missing diagram you'd like.

  - type: dropdown
    id: surface
    attributes:
      label: Which surface?
      options:
        - docs.letmepost.dev (Mintlify)
        - letmepost.dev (marketing site)
        - README.md
        - CONTRIBUTING.md / TECH.md / PRODUCT.md
        - Code comments
    validations:
      required: true

  - type: checkboxes
    id: willing
    attributes:
      label: Want to fix it yourself?
      options:
        - label: I'd like to open the PR for this (docs are usually small + isolated — great first contributions)
