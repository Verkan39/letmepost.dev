services:
  postgres:
    image: postgres:16-alpine
    container_name: letmepost-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: letmepost
      POSTGRES_PASSWORD: letmepost
      POSTGRES_DB: letmepost
    ports:
      - "5433:5432"
    volumes:
      - letmepost-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "letmepost", "-d", "letmepost"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: letmepost-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  letmepost-pg:
