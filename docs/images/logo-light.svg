<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 230 36" height="36" width="230">
  <!-- Stamp: green circle with a rotated paper-color square inside -->
  <circle cx="18" cy="18" r="16" fill="#2D7652"/>
  <rect x="8" y="8" width="20" height="20" fill="#FFFFFF" transform="rotate(16 18 18)"/>

  <!-- Wordmark — Instrument Serif italic with Georgia fallback. The serif
       matches the landing page; .dev picks up the brand green. -->
  <text
    x="44"
    y="27"
    font-family="'Instrument Serif', Georgia, 'Times New Roman', serif"
    font-style="italic"
    font-weight="400"
    font-size="26"
    fill="#171411"
  >letmepost<tspan fill="#2D7652">.dev</tspan></text>
</svg>
