name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel in-flight runs for the same PR/branch when a new push lands — saves
# Actions minutes and the latest commit is the only one we care about.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify:
    name: typecheck · lint · test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack (pnpm)
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test
        env:
          CI: true
          # Module-load env vars — `apps/api/src/db/instance.ts` calls
          # `createDb()` at import time, and `apps/api/src/auth.ts`
          # validates BETTER_AUTH_SECRET at module load. These placeholders
          # let imports succeed; no real DB connection is opened because
          # DB-backed test suites self-skip via `canRunDbTests`, which is
          # gated by the separate TEST_DATABASE_URL (unset here).
          # Add a Postgres service container later if we need full DB
          # coverage on PRs.
          DATABASE_URL: postgres://ci:ci@localhost:5432/ci
          BETTER_AUTH_SECRET: ci-throwaway-secret-not-used-anywhere-real
          # 32-byte base64 throwaway — only needed if a test triggers
          # `loadKek()` (encryption is lazy elsewhere).
          KEK_MASTER: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
