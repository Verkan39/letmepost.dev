# Weekly rebuild trigger.
#
# Why this exists:
#   /tools/linkedin-api-version-tracker generates its table at build time.
#   New LinkedIn API versions appear automatically — but only when the
#   site rebuilds. Without this workflow, the table stays frozen between
#   pushes.
#
# What it does:
#   Calls a Vercel Deploy Hook every Monday at 09:00 UTC. Vercel rebuilds
#   the marketing site; `new Date()` in the version-tracker data file
#   advances; the table refreshes; days-until-sunset on the deprecating
#   versions ticks down (these refresh client-side per visit too, but
#   the row list itself only changes on rebuild).
#
# Setup (one-time):
#   1. In Vercel: Project → Settings → Git → Deploy Hooks → "Create Hook"
#      Name: "weekly-rebuild"   Branch: main
#      Copy the URL it returns.
#   2. In GitHub: Repo → Settings → Secrets and variables → Actions
#      Add a new repository secret named VERCEL_DEPLOY_HOOK_URL with the
#      URL from step 1.
#   3. Done. The workflow will fire on the next scheduled tick.
#
# To trigger manually (e.g. right after editing OVERRIDES in
# linkedin-versions.ts), use the "Run workflow" button on the Actions
# tab — workflow_dispatch is enabled below.

name: Weekly rebuild

on:
  schedule:
    # 09:00 UTC every Monday. Earlier in the week = fresh table for the
    # rest of the week. Time chosen to avoid the 00:00 cron spike on
    # GitHub's shared runners.
    - cron: "0 9 * * 1"
  workflow_dispatch:

jobs:
  trigger-vercel:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Deploy Hook
        env:
          HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "::error::VERCEL_DEPLOY_HOOK_URL secret is not set. See workflow header for setup steps."
            exit 1
          fi
          echo "Triggering Vercel deploy…"
          curl -sf -X POST "$HOOK" -o /tmp/response.json
          echo "Response:"
          cat /tmp/response.json
