name: Feature request
description: Suggest a new capability, endpoint, schema field, dashboard surface, or SDK helper.
title: "feat: <short description>"
labels: ["type:feature", "status:needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for thinking about how letmepost.dev should grow. Before filing,
        check [`PRODUCT.md`](https://github.com/letmepost/letmepost.dev/blob/main/PRODUCT.md)
        for the seven product principles — features that contradict one of
        them get closed.

        For "add platform X" requests, use the dedicated
        **Platform request** template instead.

  - type: textarea
    id: problem
    attributes:
      label: The problem
      description: What can't you do today? Who's the user, what's the workflow, where does it break?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: |
        Concrete API surface if applicable — endpoint shape, body, response.
        Or UI sketch / wireframe link. The more concrete, the higher signal.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you tried, related ideas you rejected, prior art in other tools.

  - type: dropdown
    id: surface
    attributes:
      label: Affected surface
      multiple: true
      options:
        - api
        - dashboard
        - web (marketing)
        - docs
        - sdk
        - mcp
        - cli
        - self-host
    validations:
      required: true

  - type: checkboxes
    id: willing
    attributes:
      label: Implementation
      options:
        - label: I'd like to implement this myself
        - label: I'd help with review / testing if someone else picks it up

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Related issues, deadline-driven context, links to upstream platform docs.
