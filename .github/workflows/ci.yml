name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel in-flight runs for the same PR/branch when a new push lands — saves
# Actions minutes and the latest commit is the only one we care about.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify:
    name: typecheck · lint · test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      # Postgres for the integration test suite. Tests in apps/api/tests/
      # use `runInTransaction(tx, …)` which rolls back per-test, so a
      # single fresh DB is shared across the suite without pollution.
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: letmepost_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Reused across migrate + test steps. `TEST_DATABASE_URL` unlocks
      # the `canRunDbTests` flag so `describeIfDb` blocks execute instead
      # of skip.
      DATABASE_URL: postgres://ci:ci@localhost:5432/letmepost_ci
      TEST_DATABASE_URL: postgres://ci:ci@localhost:5432/letmepost_ci
      BETTER_AUTH_SECRET: ci-throwaway-secret-not-used-anywhere-real
      KEK_MASTER: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack (pnpm)
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Apply database migrations
        run: pnpm --filter @letmepost/api db:migrate

      - name: Test
        run: pnpm test
