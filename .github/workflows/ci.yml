name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel in-flight runs for the same PR/branch when a new push lands — saves
# Actions minutes and the latest commit is the only one we care about.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify:
    name: typecheck · lint · test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack (pnpm)
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test
        env:
          # DB-backed tests are gated by `canRunDbTests` — they self-skip when
          # POSTGRES_TEST_URL is unset. Keep CI fast on the default path; add
          # a service container later if we need full DB coverage on PRs.
          CI: true
