# Disable the "blank issue" escape hatch so every new issue lands via
# one of the structured templates below. Add contact links here for
# things that aren't issues: docs questions, security reports, billing.

blank_issues_enabled: false

contact_links:
  - name: 📖 Documentation
    url: https://docs.letmepost.dev
    about: API reference, guides, error codes, preflight rules. Most "how do I…" questions are already answered here.
  - name: 🔒 Security vulnerability
    url: https://github.com/letmepost/letmepost.dev/security/advisories/new
    about: Report privately via a GitHub security advisory (see SECURITY.md for details). Do NOT open a public issue.
  - name: ✉️ Email the maintainer
    url: mailto:kamal@letmepost.dev
    about: For anything that doesn't fit a template — billing, partnerships, custom contracts.
