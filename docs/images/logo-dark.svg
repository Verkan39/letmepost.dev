<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 230 36" height="36" width="230">
  <!-- Stamp: brighter green for dark backgrounds; negative-space rect uses
       the docs dark surface color so the cut reads correctly. -->
  <circle cx="18" cy="18" r="16" fill="#4DBE85"/>
  <rect x="8" y="8" width="20" height="20" fill="#0D1117" transform="rotate(16 18 18)"/>

  <!-- Wordmark — Instrument Serif italic with Georgia fallback. -->
  <text
    x="44"
    y="27"
    font-family="'Instrument Serif', Georgia, 'Times New Roman', serif"
    font-style="italic"
    font-weight="400"
    font-size="26"
    fill="#F2EDE3"
  >letmepost<tspan fill="#4DBE85">.dev</tspan></text>
</svg>
