version: 2

# Weekly dependency updates, grouped to keep PR noise bounded. Each
# ecosystem opens at most ~2 PRs per week (one grouped minor+patch, one
# per major). Maintainer can dismiss anything that fails CI without
# investigation cost.

updates:
  # ── npm — one entry per package.json with a lockfile ──
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Kolkata
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    labels:
      - type:chore

  - package-ecosystem: npm
    directory: /apps/api
    schedule: { interval: weekly, day: monday, time: "06:00", timezone: Asia/Kolkata }
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types: [minor, patch]
    labels: [type:chore, area:api]

  - package-ecosystem: npm
    directory: /apps/dashboard
    schedule: { interval: weekly, day: monday, time: "06:00", timezone: Asia/Kolkata }
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types: [minor, patch]
    labels: [type:chore, area:dashboard]

  - package-ecosystem: npm
    directory: /apps/web
    schedule: { interval: weekly, day: monday, time: "06:00", timezone: Asia/Kolkata }
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types: [minor, patch]
    labels: [type:chore, area:web]

  - package-ecosystem: npm
    directory: /apps/mcp
    schedule: { interval: weekly, day: monday, time: "06:00", timezone: Asia/Kolkata }
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types: [minor, patch]
    labels: [type:chore, area:mcp]

  - package-ecosystem: npm
    directory: /apps/cli
    schedule: { interval: weekly, day: monday, time: "06:00", timezone: Asia/Kolkata }
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types: [minor, patch]
    labels: [type:chore, area:cli]

  - package-ecosystem: npm
    directory: /packages/sdk-ts
    schedule: { interval: weekly, day: monday, time: "06:00", timezone: Asia/Kolkata }
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types: [minor, patch]
    labels: [type:chore, area:sdk]

  - package-ecosystem: npm
    directory: /packages/schemas
    schedule: { interval: weekly, day: monday, time: "06:00", timezone: Asia/Kolkata }
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types: [minor, patch]
    labels: [type:chore]

  # ── GitHub Actions ──
  - package-ecosystem: github-actions
    directory: /
    schedule: { interval: weekly, day: monday, time: "06:00", timezone: Asia/Kolkata }
    open-pull-requests-limit: 3
    groups:
      actions:
        patterns: ["*"]
    labels: [type:chore]
